<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 시급 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 금액 카드의 그라데이션 및 그림자 효과 */
        .glass-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }
        /* 실시간 깜빡임 효과 */
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative">
        <!-- 상단 헤더: 현재 시간 -->
        <div class="bg-blue-600 p-8 text-center text-white relative">
            <div class="flex items-center justify-center gap-2 mb-2">
                <div class="w-2 h-2 rounded-full bg-green-400 pulse"></div>
                <span class="text-blue-200 text-sm font-semibold tracking-wider">LIVE CURRENT TIME</span>
            </div>
            <div id="currentTime" class="text-5xl font-bold font-mono tracking-tight drop-shadow-md">
                00:00:00
            </div>
        </div>

        <div class="p-6">
            <!-- 진행률 및 이모티콘 바 -->
            <div class="mb-8">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-sm font-bold text-gray-500">오늘의 진행률</span>
                    <div class="flex items-center gap-2">
                        <span id="percentageText" class="text-xl font-bold text-blue-600 font-mono">0.0000%</span>
                        <span id="emoji" class="text-3xl transition-transform duration-300 transform hover:scale-110">😫</span>
                    </div>
                </div>
                <div class="h-4 bg-gray-200 rounded-full overflow-hidden shadow-inner">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full transition-all duration-100 ease-linear w-0"></div>
                </div>
                <div class="flex justify-between mt-1 text-xs text-gray-400 font-mono">
                    <span>08:00</span>
                    <span>18:00</span>
                </div>
            </div>

            <!-- 핵심 금액 표시 카드 -->
            <div class="glass-card rounded-2xl p-6 text-white relative">
                <!-- 우측 상단 뱃지: 시급 정보 -->
                <div class="absolute top-4 right-4 bg-blue-500/20 text-blue-300 text-xs px-2 py-1 rounded-md border border-blue-500/30">
                    시급 30,000원
                </div>

                <!-- 세전 금액 (명목액) -->
                <div class="mb-5">
                    <p class="text-sm text-gray-400 mb-1 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        현재까지 번 돈 (세전)
                    </p>
                    <div class="flex items-baseline gap-1">
                        <span id="grossAmount" class="text-4xl font-bold font-mono tracking-tight text-gray-200">0</span>
                        <span class="text-lg text-gray-400">원</span>
                    </div>
                </div>

                <div class="w-full h-px bg-slate-700 my-4"></div>

                <!-- 세후 금액 (실수령액) -->
                <div>
                    <p class="text-sm text-indigo-300 mb-1 font-semibold flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        실수령액 (세후 3.3%)
                    </p>
                    <div class="flex items-baseline gap-1">
                        <span id="netAmount" class="text-5xl font-bold font-mono tracking-tight text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">0</span>
                        <span class="text-xl text-indigo-200">원</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const wagePerHour = 30000; 
        const taxRate = 0.033; // 3.3%
        const emojis = ['😫', '😟', '😐', '🙂', '😆', '🥳'];

        function formatTime(date) {
            return date.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function calculateSalary() {
            const now = new Date();
            
            // 시계 업데이트
            document.getElementById('currentTime').innerText = formatTime(now);

            // 오늘 날짜 기준 시간 설정
            const year = now.getFullYear();
            const month = now.getMonth();
            const date = now.getDate();
            
            const startWork = new Date(year, month, date, 8, 0, 0);   // 08:00
            const lunchStart = new Date(year, month, date, 12, 0, 0); // 12:00
            const lunchEnd = new Date(year, month, date, 13, 0, 0);   // 13:00
            const endWork = new Date(year, month, date, 18, 0, 0);    // 18:00

            // 총 근무 시간 (점심시간 제외) - 밀리초 단위 계산
            const totalWorkTimeMs = (endWork - startWork) - (lunchEnd - lunchStart); 
            const wagePerMs = wagePerHour / (60 * 60 * 1000); // 1밀리초당 시급

            let workedMs = 0; // 경과 밀리초

            // 현재 시간에 따른 경과 시간(밀리초) 계산 로직
            if (now >= endWork) {
                // 퇴근 시간 이후: 최대 근무 시간으로 고정
                workedMs = totalWorkTimeMs;
            } else if (now > startWork) {
                if (now < lunchStart) {
                    // 점심시간 전
                    workedMs = now - startWork;
                } else if (now >= lunchStart && now <= lunchEnd) {
                    // 점심시간 중 (시간 정지)
                    workedMs = lunchStart - startWork;
                } else {
                    // 점심시간 후
                    workedMs = (lunchStart - startWork) + (now - lunchEnd);
                }
            }

            // 금액 계산 (소수점 포함된 정확한 시간 기반)
            const grossAmount = workedMs * wagePerMs;
            const netAmount = grossAmount * (1 - taxRate);

            // 퍼센트 계산
            let percent = (workedMs / totalWorkTimeMs) * 100;
            if (percent > 100) percent = 100;

            // 이모티콘 인덱스 계산 (0~4는 20% 구간별, 100% 달성 시 5)
            let emojiIndex = Math.floor(percent / 20);
            if (percent >= 100) emojiIndex = 5;
            else if (emojiIndex > 4) emojiIndex = 4;

            // DOM 업데이트
            // 0.1초마다 숫자가 부드럽게 바뀌도록 Math.floor를 최종 렌더링에만 적용
            document.getElementById('grossAmount').innerText = Math.floor(grossAmount).toLocaleString('ko-KR');
            document.getElementById('netAmount').innerText = Math.floor(netAmount).toLocaleString('ko-KR');
            
            document.getElementById('percentageText').innerText = percent.toFixed(4) + '%';
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('emoji').innerText = emojis[emojiIndex];
        }

        // 100ms(0.1초) 간격으로 업데이트 실행
        setInterval(calculateSalary, 100);
        calculateSalary(); // 초기 1회 즉시 실행
    </script>
</body>
</html>
